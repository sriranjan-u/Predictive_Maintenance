name: Predictive Maintenance MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] 

jobs:
  # STAGE 0: Quality Gate
  code-quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Check code formatting
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # STAGE 1: Data Ingestion & Registration
  data-ingestion:
    name: Data Ingestion & Registration
    needs: code-quality 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Predictive_Maintenance
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' 
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Data Ingestion
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/data_ingestion.py

  # STAGE 2: Data Preparation
  data-prep:
    name: Data Preparation
    needs: data-ingestion
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Predictive_Maintenance
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Preprocessing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/preprocessing.py

  # STAGE 3: Model Training & Registration
  model-training:
    name: Model Training & Registration
    needs: data-prep
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Predictive_Maintenance
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/model_training.py
      - name: Register Best Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/register_model.py

  # STAGE 4: Deployment
  deploy-hosting:
    name: Deploy to Streamlit / HF Spaces
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Authenticating as your specific GitHub user
          git config --global user.email "sriranjan.u@gmail.com"
          git config --global user.name "sriranjan-u"
          
          # Targeting your exact Hugging Face Space
          git remote add huggingface https://huggingface.co/spaces/Sriranjan/Car_Predictive_Maintenance
          
          # Using subtree push so HF gets app.py at the root level, ignoring the parent folder
          git subtree push --prefix Predictive_Maintenance huggingface main
