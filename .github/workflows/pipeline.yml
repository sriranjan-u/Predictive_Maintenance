name: Car Predictive Maintenance MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Check code formatting
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  data-ingestion:
    name: Data Ingestion & Registration
    needs: code-quality 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Run Data Ingestion
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/data_ingestion.py

  data-prep:
    name: Data Preparation & EDA
    needs: data-ingestion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Run EDA
        run: python src/eda.py  # <--- Added EDA Script
      - name: Run Preprocessing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/preprocessing.py

  model-training:
    name: Model Training & Visualization
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Train Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/model_training.py
      - name: Generate Metric Visualizations
        run: python src/visualize_metrics.py # <--- Added Visualization Script
      - name: Register Best Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/register_model.py

  deploy-hosting:
    name: Deploy to Streamlit / HF Spaces
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sriranjan.u@gmail.com"
          git config --global user.name "sriranjan-u"
          git lfs install
          git lfs track "*.png"
          git lfs track "*.pkl"
          git lfs track "*.joblib"
          git add .gitattributes
          git commit -m "Update LFS assets and visualizations" || echo "No changes"
          git lfs migrate import --everything --include="*.png,*.pkl,*.joblib" --yes
          git remote add huggingface https://Sriranjan:$HF_TOKEN@huggingface.co/spaces/Sriranjan/Car_Predictive_Maintenance || true
          git push --force huggingface main
