name: Car Predictive Maintenance MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] 

# GLOBAL CONFIG: Forces all GitHub Actions to use Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STAGE 0: Quality Gate
  code-quality:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Check code formatting
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # STAGE 1: Data Ingestion & Registration
  data-ingestion:
    name: Data Ingestion & Registration
    needs: code-quality 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Run Data Ingestion
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/data_ingestion.py

  # STAGE 2: Data Preparation
  data-prep:
    name: Data Preparation
    needs: data-ingestion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Run Preprocessing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/preprocessing.py

  # STAGE 3: Model Training & Registration
  model-training:
    name: Model Training & Registration
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<70.0.0"
          pip install -r requirements.txt
      - name: Train Models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/model_training.py
      - name: Register Best Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python src/register_model.py

  # STAGE 4: Deployment
  deploy-hosting:
    name: Deploy to Streamlit / HF Spaces
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for HF push
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sriranjan.u@gmail.com"
          git config --global user.name "sriranjan-u"
          
          # 1. Initialize LFS
          git lfs install
          
          # 2. Track the files
          git lfs track "*.png"
          git lfs track "*.pkl"
          git lfs track "*.joblib"
          git add .gitattributes
          
          # 3. Commit the tracking rules first to make the "working copy" clean
          git commit -m "Update LFS tracking attributes" || echo "No changes to commit"
          
          # 4. Now run migration on a clean working copy
          git lfs migrate import --everything --include="*.png,*.pkl,*.joblib"
          
          # 5. Push to Hugging Face
          git remote add huggingface https://huggingface.co/spaces/Sriranjan/Car_Predictive_Maintenance || true
          git push --force huggingface main
